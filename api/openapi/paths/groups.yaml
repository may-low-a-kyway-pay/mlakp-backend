  /v1/groups:
    post:
      tags:
        - Groups
      summary: Create a group
      operationId: createGroup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
            example:
              name: Home
      responses:
        "201":
          description: Group created. The creator is added as owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
              example:
                success: true
                data:
                  group:
                    id: b2c1c30f-5c3e-4376-9d4e-ef56ef7c8b81
                    name: Home
                    created_by: 3b43c6da-2f6f-4f46-ae15-f2f6a25dfe62
                    created_at: "2026-05-03T10:15:00Z"
                    updated_at: "2026-05-03T10:15:00Z"
        "400":
          description: Invalid JSON or invalid group input.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidJson:
                  value:
                    success: false
                    error:
                      code: invalid_json
                      message: Request body must be valid JSON
                invalidGroupName:
                  value:
                    success: false
                    error:
                      code: invalid_group_name
                      message: Group name must be between 1 and 120 characters
        "401":
          description: Missing, malformed, expired, invalid, or stale access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags:
        - Groups
      summary: List current user's groups
      operationId: listGroups
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Groups the current user belongs to.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupListResponse"
              example:
                success: true
                data:
                  groups:
                    - id: b2c1c30f-5c3e-4376-9d4e-ef56ef7c8b81
                      name: Home
                      created_by: 3b43c6da-2f6f-4f46-ae15-f2f6a25dfe62
                      created_at: "2026-05-03T10:15:00Z"
                      updated_at: "2026-05-03T10:15:00Z"
        "401":
          description: Missing, malformed, expired, invalid, or stale access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/groups/{groupID}:
    get:
      tags:
        - Groups
      summary: Get a group and its members
      operationId: getGroup
      security:
        - bearerAuth: []
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Group details for a group the current user belongs to.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupDetailsResponse"
              example:
                success: true
                data:
                  group:
                    id: b2c1c30f-5c3e-4376-9d4e-ef56ef7c8b81
                    name: Home
                    created_by: 3b43c6da-2f6f-4f46-ae15-f2f6a25dfe62
                    created_at: "2026-05-03T10:15:00Z"
                    updated_at: "2026-05-03T10:15:00Z"
                  members:
                    - id: 279ef8bd-90ec-47a6-883f-2bb664f9ec44
                      group_id: b2c1c30f-5c3e-4376-9d4e-ef56ef7c8b81
                      user_id: 3b43c6da-2f6f-4f46-ae15-f2f6a25dfe62
                      role: owner
                      joined_at: "2026-05-03T10:15:00Z"
        "400":
          description: Invalid group ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing, malformed, expired, invalid, or stale access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Group is not visible to the current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/groups/{groupID}/members:
    post:
      tags:
        - Groups
      summary: Add a member to a group
      operationId: addGroupMember
      security:
        - bearerAuth: []
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddGroupMemberRequest"
            example:
              user_id: 755a01f4-fc4e-483f-9d39-d8dccb7d77c0
      responses:
        "201":
          description: Member added to the group.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMemberResponse"
              example:
                success: true
                data:
                  member:
                    id: 2d98a193-8d18-439e-a88f-9c79cf4ed12d
                    group_id: b2c1c30f-5c3e-4376-9d4e-ef56ef7c8b81
                    user_id: 755a01f4-fc4e-483f-9d39-d8dccb7d77c0
                    role: member
                    joined_at: "2026-05-03T10:20:00Z"
        "400":
          description: Invalid JSON, group ID, or user ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing, malformed, expired, invalid, or stale access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Current user is not a group owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User to add was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: User is already a group member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"
