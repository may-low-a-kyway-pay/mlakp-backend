  /v1/dashboard:
    get:
      tags:
        - Dashboard
      summary: Get dashboard snapshot
      description: Returns current-user you_owe and you_get totals, per-person active balances with pending-payment review state, and the five most recent pending or active unsettled balances with remaining amount.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
