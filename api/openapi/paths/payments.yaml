  /v1/payments:
    get:
      tags:
        - Payments
      summary: List current-user payments
      description: Lists payments involving the authenticated user. Use `type=received&status=pending_confirmation` as the creditor review inbox.
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          required: false
          description: Use `received` for payments awaiting or completed by the current user as creditor, `sent` for payments submitted by the current user, or `all` to include both directions.
          schema:
            type: string
            enum:
              - received
              - sent
              - all
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending_confirmation
              - confirmed
              - rejected
      responses:
        "200":
          description: Current-user payments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentsResponse"
        "400":
          description: Invalid payment type or status filter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_payment_type:
                  value:
                    success: false
                    error:
                      code: invalid_payment_type
                      message: Payment type filter must be received, sent, or all
                invalid_payment_status:
                  value:
                    success: false
                    error:
                      code: invalid_payment_status
                      message: Payment status filter is invalid
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/payments/bulk:
    post:
      tags:
        - Payments
      summary: Mark bulk payments to one receiver
      description: Allows the authenticated debtor to submit one amount toward accepted or partially settled debts owed to a selected receiver. The amount is allocated across eligible debts and each created payment waits for creditor review.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkMarkPaymentRequest"
            examples:
              pay_receiver_total:
                value:
                  received_by: "00000000-0000-0000-0000-000000000002"
                  amount: "75.00"
                  note: Bank transfer
      responses:
        "201":
          description: Bulk payments marked and waiting for creditor review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPaymentsResponse"
        "400":
          description: Invalid JSON, receiver, or amount.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Current user cannot submit a payment to themself.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No eligible debts found for this receiver.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Payment amount exceeds eligible remaining debt amount.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          $ref: "#/components/responses/RequestBodyTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/debts/{debtID}/payments:
    post:
      tags:
        - Payments
      summary: Mark a debt payment
      description: Allows the authenticated debtor to mark a full or partial payment against an accepted or partially settled debt.
      security:
        - bearerAuth: []
      parameters:
        - name: debtID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkPaymentRequest"
            examples:
              partial_payment:
                value:
                  amount: "25.00"
                  note: Bank transfer
      responses:
        "201":
          description: Payment marked and waiting for creditor review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "400":
          description: Invalid debt ID, JSON, or amount.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Current user is not the debtor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Debt not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Debt cannot accept payment, already has a pending payment, or amount exceeds remaining balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_debt_state:
                  value:
                    success: false
                    error:
                      code: invalid_debt_state
                      message: Debt cannot accept payments in its current state
                payment_pending_confirmation_exists:
                  value:
                    success: false
                    error:
                      code: payment_pending_confirmation_exists
                      message: A payment for this debt is already waiting for creditor review
                payment_amount_exceeds_remaining:
                  value:
                    success: false
                    error:
                      code: payment_amount_exceeds_remaining
                      message: Payment amount exceeds remaining debt amount
        "413":
          $ref: "#/components/responses/RequestBodyTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/payments/{paymentID}:
    post:
      tags:
        - Payments
      summary: Review a payment
      description: Allows the authenticated creditor to confirm or reject a pending payment.
      security:
        - bearerAuth: []
      parameters:
        - name: paymentID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewPaymentRequest"
            examples:
              confirm:
                value:
                  type: confirm
              reject:
                value:
                  type: reject
      responses:
        "200":
          description: Payment reviewed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "400":
          description: Invalid payment ID, JSON, or review type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Current user is not the creditor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Payment or debt is not in a reviewable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          $ref: "#/components/responses/RequestBodyTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
