    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - username
        - email
        - password
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: "^[a-z0-9_]+$"
          description: Unique lowercase username used for member search.
        email:
          type: string
          format: email
          maxLength: 254
          description: Email is normalized to lowercase before storage.
        password:
          type: string
          format: password
          minLength: 8
          writeOnly: true
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          format: password
          minLength: 1
          writeOnly: true
    RefreshTokenRequest:
      type: object
      additionalProperties: false
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          minLength: 1
          writeOnly: true
    AuthTokenResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/AuthTokenData"
    RefreshTokenResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/RefreshTokenData"
    AuthTokenData:
      type: object
      additionalProperties: false
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_at
        - user
      properties:
        access_token:
          type: string
          description: Short-lived HMAC-SHA256 signed access token.
        refresh_token:
          type: string
          description: Opaque refresh token. Store securely on the client.
        token_type:
          type: string
          enum:
            - Bearer
        expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"
        verification_warning:
          type: string
          description: Present while the account is inside the email verification grace period.
        verification_deadline:
          type: string
          format: date-time
          nullable: true
          description: Deadline for email verification.
        verification_status:
          type: string
          enum:
            - pending
            - pending_grace_period
            - expired
          description: Current email verification status when the email is not verified.
    SendOTPRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - purpose
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          description: Email address to send OTP to.
        purpose:
          type: string
          enum:
            - signup
            - password_reset
          description: Purpose of the OTP request.
    VerifyOTPRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - otp
        - purpose
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        otp:
          type: string
          pattern: "^[0-9]{6}$"
          description: 6-digit OTP code.
        purpose:
          type: string
          enum:
            - signup
    ResetPasswordRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - otp
        - new_password
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        otp:
          type: string
          pattern: "^[0-9]{6}$"
          description: 6-digit OTP code.
        new_password:
          type: string
          format: password
          minLength: 8
          writeOnly: true
    OTPResponse:
      type: object
      additionalProperties: false
      required:
        - message
        - expires_at
        - purpose
      properties:
        message:
          type: string
          example: OTP sent successfully
        expires_at:
          type: string
          format: date-time
        purpose:
          type: string
          enum:
            - signup
            - password_reset
    OTPVerificationResponse:
      type: object
      additionalProperties: false
      properties:
        verified:
          type: boolean
          example: true
        access_token:
          type: string
          description: Access token (only for signup verification that creates a session).
        refresh_token:
          type: string
          description: Refresh token (only for signup verification that creates a session).
        token_type:
          type: string
          enum:
            - Bearer
        expires_at:
          type: string
          format: date-time
        message:
          type: string
          example: Email verified successfully
    PasswordResetResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
          example: Password reset successfully
