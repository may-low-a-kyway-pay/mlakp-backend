    CreateExpenseRequest:
      type: object
      additionalProperties: false
      required:
        - group_id
        - title
        - total_amount
        - paid_by
        - split_type
        - participants
      properties:
        group_id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 160
        description:
          type: string
          nullable: true
        total_amount:
          type: string
          pattern: '^[0-9]+(\.[0-9]{1,2})?$'
          example: "100.00"
        currency:
          type: string
          enum:
            - THB
          default: THB
        paid_by:
          type: string
          format: uuid
        split_type:
          type: string
          enum:
            - equal
            - manual
        receipt_url:
          type: string
          format: uri
          nullable: true
        expense_date:
          type: string
          format: date
          nullable: true
        participants:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CreateExpenseParticipantRequest"
    CreateExpenseParticipantRequest:
      type: object
      additionalProperties: false
      required:
        - user_id
      properties:
        user_id:
          type: string
          format: uuid
        share_amount:
          type: string
          pattern: '^[0-9]+(\.[0-9]{1,2})?$'
          nullable: true
          description: Required when split_type is manual. Ignored for equal split.
    CreateExpenseResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - expense
            - participants
            - debts
          properties:
            expense:
              $ref: "#/components/schemas/Expense"
            participants:
              type: array
              items:
                $ref: "#/components/schemas/ExpenseParticipant"
            debts:
              type: array
              items:
                $ref: "#/components/schemas/Debt"
    ExpenseDetailsResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - expense
            - participants
            - debts
          properties:
            expense:
              $ref: "#/components/schemas/Expense"
            participants:
              type: array
              items:
                $ref: "#/components/schemas/ExpenseParticipant"
            debts:
              type: array
              items:
                $ref: "#/components/schemas/Debt"
    ListExpensesResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - expenses
          properties:
            expenses:
              type: array
              items:
                $ref: "#/components/schemas/Expense"
    Expense:
      type: object
      additionalProperties: false
      required:
        - id
        - group_id
        - title
        - total_amount
        - total_amount_minor
        - currency
        - paid_by
        - split_type
        - created_by
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        total_amount:
          type: string
        total_amount_minor:
          type: integer
          format: int64
        currency:
          type: string
        paid_by:
          type: string
          format: uuid
        split_type:
          type: string
        receipt_url:
          type: string
          nullable: true
        expense_date:
          type: string
          format: date
          nullable: true
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ExpenseParticipant:
      type: object
      additionalProperties: false
      required:
        - id
        - expense_id
        - user_id
        - share_amount
        - share_amount_minor
        - created_at
      properties:
        id:
          type: string
          format: uuid
        expense_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        share_amount:
          type: string
        share_amount_minor:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    Debt:
      type: object
      additionalProperties: false
      required:
        - id
        - expense_id
        - debtor_id
        - creditor_id
        - original_amount
        - original_amount_minor
        - remaining_amount
        - remaining_amount_minor
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        expense_id:
          type: string
          format: uuid
        expense_title:
          type: string
        debtor_id:
          type: string
          format: uuid
        debtor_name:
          type: string
        debtor_username:
          type: string
        creditor_id:
          type: string
          format: uuid
        creditor_name:
          type: string
        creditor_username:
          type: string
        original_amount:
          type: string
        original_amount_minor:
          type: integer
          format: int64
        remaining_amount:
          type: string
        remaining_amount_minor:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - pending
            - accepted
            - rejected
            - partially_settled
            - settled
        accepted_at:
          type: string
          format: date-time
          nullable: true
        rejected_at:
          type: string
          format: date-time
          nullable: true
        settled_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UpdateDebtRequest:
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - accept
            - reject
    ReviewRejectedDebtRequest:
      type: object
      additionalProperties: false
      properties:
        amount:
          type: string
          pattern: '^[0-9]+(\.[0-9]{1,2})?$'
          nullable: true
          description: Optional adjusted amount. Omit to resend the rejected debt with the previous amount.
    DebtResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - debt
          properties:
            debt:
              $ref: "#/components/schemas/Debt"
    DebtsResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - debts
          properties:
            debts:
              type: array
              items:
                $ref: "#/components/schemas/Debt"
