  schemas:
    StatusResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - status
          properties:
            status:
              type: string
    Pagination:
      type: object
      additionalProperties: false
      required:
        - page
        - per_page
        - total_items
        - total_pages
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total_items:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0
    SuccessResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          nullable: true
    PaginatedResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
        - pagination
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          nullable: true
        pagination:
          $ref: "#/components/schemas/Pagination"
    ErrorDetail:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          enum:
            - false
        error:
          $ref: "#/components/schemas/ErrorDetail"
