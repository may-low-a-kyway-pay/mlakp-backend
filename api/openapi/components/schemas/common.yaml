  schemas:
    StatusResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: object
          additionalProperties: false
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
