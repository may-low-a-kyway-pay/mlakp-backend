    MarkPaymentRequest:
      type: object
      additionalProperties: false
      required:
        - amount
      properties:
        amount:
          type: string
          pattern: '^[0-9]+(\.[0-9]{1,2})?$'
          example: "25.00"
        note:
          type: string
          nullable: true
    ReviewPaymentRequest:
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - confirm
            - reject
    Payment:
      type: object
      additionalProperties: false
      required:
        - id
        - debt_id
        - paid_by
        - received_by
        - amount
        - amount_minor
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        debt_id:
          type: string
          format: uuid
        paid_by:
          type: string
          format: uuid
        received_by:
          type: string
          format: uuid
        amount:
          type: string
        amount_minor:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - pending_confirmation
            - confirmed
            - rejected
        note:
          type: string
          nullable: true
        confirmed_at:
          type: string
          format: date-time
          nullable: true
        rejected_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PaymentResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - payment
          properties:
            payment:
              $ref: "#/components/schemas/Payment"
