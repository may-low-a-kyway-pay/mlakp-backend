    MarkPaymentRequest:
      type: object
      additionalProperties: false
      required:
        - amount
      properties:
        amount:
          type: string
          pattern: '^[0-9]+(\.[0-9]{1,2})?$'
          example: "25.00"
        note:
          type: string
          nullable: true
    ReviewPaymentRequest:
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - confirm
            - reject
    Payment:
      type: object
      additionalProperties: false
      required:
        - id
        - debt_id
        - paid_by
        - received_by
        - amount
        - amount_minor
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        debt_id:
          type: string
          format: uuid
        paid_by:
          type: string
          format: uuid
        received_by:
          type: string
          format: uuid
        amount:
          type: string
        amount_minor:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - pending_confirmation
            - confirmed
            - rejected
        note:
          type: string
          nullable: true
        confirmed_at:
          type: string
          format: date-time
          nullable: true
        rejected_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PaymentListItem:
      allOf:
        - $ref: "#/components/schemas/Payment"
        - type: object
          additionalProperties: false
          required:
            - expense_id
            - expense_title
            - paid_by_name
            - received_by_name
            - debt_remaining_amount
            - debt_remaining_amount_minor
            - debt_status
          properties:
            expense_id:
              type: string
              format: uuid
            expense_title:
              type: string
            paid_by_name:
              type: string
            received_by_name:
              type: string
            debt_remaining_amount:
              type: string
            debt_remaining_amount_minor:
              type: integer
              format: int64
            debt_status:
              type: string
              enum:
                - accepted
                - partially_settled
                - settled
    PaymentResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - payment
          properties:
            payment:
              $ref: "#/components/schemas/Payment"
    PaymentsResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - payments
          properties:
            payments:
              type: array
              items:
                $ref: "#/components/schemas/PaymentListItem"
