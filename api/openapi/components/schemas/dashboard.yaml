    DashboardAmount:
      type: object
      additionalProperties: false
      required:
        - amount
        - amount_minor
        - debt_count
      properties:
        amount:
          type: string
        amount_minor:
          type: integer
          format: int64
        debt_count:
          type: integer
          format: int64
    Dashboard:
      type: object
      additionalProperties: false
      required:
        - you_owe
        - you_get
        - person_balances
        - unsettled_balances
      properties:
        you_owe:
          $ref: "#/components/schemas/DashboardAmount"
        you_get:
          $ref: "#/components/schemas/DashboardAmount"
        person_balances:
          type: array
          items:
            $ref: "#/components/schemas/DashboardPersonBalance"
        unsettled_balances:
          type: array
          maxItems: 5
          items:
            $ref: "#/components/schemas/DashboardUnsettledBalance"
    DashboardUser:
      type: object
      additionalProperties: false
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    DashboardPersonBalance:
      type: object
      additionalProperties: false
      required:
        - type
        - other_user
        - remaining_amount
        - remaining_amount_minor
        - debt_count
        - has_pending_payment
      properties:
        type:
          type: string
          enum:
            - owed
            - receivable
        other_user:
          $ref: "#/components/schemas/DashboardUser"
        remaining_amount:
          type: string
        remaining_amount_minor:
          type: integer
          format: int64
        debt_count:
          type: integer
          format: int64
        has_pending_payment:
          type: boolean
          description: True when at least one debt in this person balance has a payment waiting for creditor review.
    DashboardUnsettledBalance:
      type: object
      additionalProperties: false
      required:
        - id
        - expense_id
        - expense_title
        - type
        - other_user
        - remaining_amount
        - remaining_amount_minor
        - status
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        expense_id:
          type: string
          format: uuid
        expense_title:
          type: string
        type:
          type: string
          enum:
            - owed
            - receivable
        other_user:
          $ref: "#/components/schemas/DashboardUser"
        remaining_amount:
          type: string
        remaining_amount_minor:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - pending
            - accepted
            - partially_settled
        updated_at:
          type: string
          format: date-time
    DashboardResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - dashboard
          properties:
            dashboard:
              $ref: "#/components/schemas/Dashboard"
