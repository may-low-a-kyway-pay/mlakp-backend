    Notification:
      type: object
      additionalProperties: false
      required:
        - id
        - user_id
        - type
        - title
        - body
        - entity_type
        - entity_id
        - metadata
        - read_at
        - created_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - expense.created
            - debt.accepted
            - debt.rejected
            - debt.resent
            - payment.marked
            - payment.confirmed
            - payment.rejected
        title:
          type: string
        body:
          type: string
        entity_type:
          type: string
          enum:
            - expense
            - debt
            - payment
        entity_id:
          type: string
          format: uuid
        metadata:
          type: object
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    NotificationsResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - notifications
            - unread_count
          properties:
            notifications:
              type: array
              items:
                $ref: "#/components/schemas/Notification"
            unread_count:
              type: integer
              format: int64
              minimum: 0
    NotificationReadResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - notification
            - unread_count
          properties:
            notification:
              $ref: "#/components/schemas/Notification"
            unread_count:
              type: integer
              format: int64
              minimum: 0
    NotificationsReadAllResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - unread_count
          properties:
            unread_count:
              type: integer
              format: int64
              minimum: 0
    RealtimeNotificationEvent:
      type: object
      additionalProperties: false
      required:
        - kind
        - unread_count
      properties:
        kind:
          type: string
          enum:
            - notification.created
            - notification.read
            - notifications.read_all
        notification:
          $ref: "#/components/schemas/Notification"
        unread_count:
          type: integer
          format: int64
          minimum: 0
