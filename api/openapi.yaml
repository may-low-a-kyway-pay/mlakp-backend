          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDebtRequest"
            examples:
              accept:
                value:
                  type: accept
              reject:
                value:
                  type: reject
      responses:
        "200":
          description: Debt state updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtResponse"
        "400":
          description: Invalid debt ID, JSON, or transition type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_debt_id:
                  value:
                    success: false
                    error:
                      code: invalid_debt_id
                      message: Debt ID is invalid
                invalid_debt_transition_type:
                  value:
                    success: false
                    error:
                      code: invalid_debt_transition_type
                      message: Debt transition type must be accept or reject
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Current user is not the debtor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                debt_forbidden:
                  value:
                    success: false
                    error:
                      code: debt_forbidden
                      message: You are not allowed to update this debt
        "404":
          description: Debt not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                debt_not_found:
                  value:
                    success: false
                    error:
                      code: debt_not_found
                      message: Debt was not found
        "409":
          description: Debt is not pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_debt_state:
                  value:
                    success: false
                    error:
                      code: invalid_debt_state
                      message: Debt cannot be updated from its current state
        "413":
          $ref: "#/components/responses/RequestBodyTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/debts/{debtID}/review:
    post:
      tags:
        - Debts
      summary: Review and resend a rejected debt
      description: Allows a group owner to review a rejected debt, optionally adjust its amount, and resend it by moving it back to pending state.
      security:
        - bearerAuth: []
      parameters:
        - name: debtID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRejectedDebtRequest"
            examples:
              resend_same_amount:
                value: {}
              adjust_and_resend:
                value:
                  amount: "25.00"
      responses:
        "200":
          description: Debt reviewed and resent to debtor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtResponse"
        "400":
          description: Invalid debt ID, JSON, or amount.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_amount:
                  value:
                    success: false
                    error:
                      code: invalid_amount
                      message: Debt amount is invalid
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Current user is not a group owner for the debt's group.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                debt_forbidden:
                  value:
                    success: false
                    error:
                      code: debt_forbidden
                      message: You are not allowed to update this debt
        "404":
          description: Debt not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Debt is not rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_debt_state:
                  value:
                    success: false
                    error:
                      code: invalid_debt_state
                      message: Debt cannot be updated from its current state
        "413":
          $ref: "#/components/responses/RequestBodyTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/payments:
    get:
      tags:
        - Payments
      summary: List current-user payments
      description: Lists payments involving the authenticated user. Use `type=received&status=pending_confirmation` as the creditor review inbox.
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          required: false
          description: Use `received` for payments awaiting or completed by the current user as creditor, `sent` for payments submitted by the current user, or `all` to include both directions.
          schema:
            type: string
            enum:
              - received
              - sent
              - all
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending_confirmation
              - confirmed
              - rejected
      responses:
        "200":
          description: Current-user payments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentsResponse"
        "400":
          description: Invalid payment type or status filter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_payment_type:
                  value:
                    success: false
                    error:
                      code: invalid_payment_type
                      message: Payment type filter must be received, sent, or all
                invalid_payment_status:
                  value:
                    success: false
                    error:
                      code: invalid_payment_status
                      message: Payment status filter is invalid
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/debts/{debtID}/payments:
    post:
      tags:
        - Payments
      summary: Mark a debt payment
      description: Allows the authenticated debtor to mark a full or partial payment against an accepted or partially settled debt.
      security:
        - bearerAuth: []
      parameters:
        - name: debtID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkPaymentRequest"
            examples:
              partial_payment:
                value:
                  amount: "25.00"
                  note: Bank transfer
      responses:
        "201":
          description: Payment marked and waiting for creditor review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "400":
          description: Invalid debt ID, JSON, or amount.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Current user is not the debtor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Debt not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Debt cannot accept payment or amount exceeds remaining balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_debt_state:
                  value:
                    success: false
                    error:
                      code: invalid_debt_state
                      message: Debt cannot accept payments in its current state
                payment_amount_exceeds_remaining:
                  value:
                    success: false
                    error:
                      code: payment_amount_exceeds_remaining
                      message: Payment amount exceeds remaining debt amount
        "413":
          $ref: "#/components/responses/RequestBodyTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/payments/{paymentID}:
    post:
      tags:
        - Payments
      summary: Review a payment
      description: Allows the authenticated creditor to confirm or reject a pending payment.
      security:
        - bearerAuth: []
      parameters:
        - name: paymentID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewPaymentRequest"
            examples:
              confirm:
                value:
                  type: confirm
              reject:
                value:
                  type: reject
      responses:
        "200":
          description: Payment reviewed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "400":
          description: Invalid payment ID, JSON, or review type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Current user is not the creditor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Payment or debt is not in a reviewable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          $ref: "#/components/responses/RequestBodyTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/dashboard:
    get:
      tags:
        - Dashboard
      summary: Get dashboard snapshot
      description: Returns current-user you_owe and you_get totals for accepted and partially settled debts plus the five most recent pending or active unsettled balances with remaining amount.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HMAC-SHA256
  responses:
    RequestBodyTooLarge:
      description: Request body exceeds the maximum accepted size.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: request_body_too_large
              message: Request body must be 1 MiB or smaller
    TooManyRequests:
      description: Request rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: rate_limited
              message: Too many requests. Please retry later
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: internal_error
              message: Internal server error
  schemas:
    StatusResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - status
          properties:
            status:
              type: string
    Pagination:
      type: object
      additionalProperties: false
      required:
        - page
        - per_page
        - total_items
        - total_pages
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total_items:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0
    SuccessResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          nullable: true
    PaginatedResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
        - pagination
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          nullable: true
        pagination:
          $ref: "#/components/schemas/Pagination"
    ErrorDetail:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          enum:
            - false
        error:
          $ref: "#/components/schemas/ErrorDetail"
    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - username
        - email
        - password
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: "^[a-z0-9_]+$"
          description: Unique lowercase username used for member search.
        email:
          type: string
          format: email
          maxLength: 254
          description: Email is normalized to lowercase before storage.
        password:
          type: string
          format: password
          minLength: 8
          writeOnly: true
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          format: password
          minLength: 1
          writeOnly: true
    RefreshTokenRequest:
      type: object
      additionalProperties: false
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          minLength: 1
          writeOnly: true
    AuthTokenResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/AuthTokenData"
    RefreshTokenResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/RefreshTokenData"
    AuthTokenData:
      type: object
      additionalProperties: false
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_at
        - user
      properties:
        access_token:
          type: string
          description: Short-lived HMAC-SHA256 signed access token.
        refresh_token:
          type: string
          description: Opaque refresh token. Store securely on the client.
        token_type:
          type: string
          enum:
            - Bearer
        expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"
    RefreshTokenData:
      type: object
      additionalProperties: false
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_at
      properties:
        access_token:
          type: string
          description: Short-lived HMAC-SHA256 signed access token.
        refresh_token:
          type: string
          description: Rotated opaque refresh token. Replaces the previous refresh token.
        token_type:
          type: string
          enum:
            - Bearer
        expires_at:
          type: string
          format: date-time
    CurrentUserResponse:
