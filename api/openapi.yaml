    StatusResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          additionalProperties: false
          required:
            - status
          properties:
            status:
              type: string
    Pagination:
      type: object
      additionalProperties: false
      required:
        - page
        - per_page
        - total_items
        - total_pages
      properties:
        page:
