          maxLength: 160
        description:
          type: string
          nullable: true
        total_amount:
          type: string
          pattern: '^[0-9]+(\.[0-9]{1,2})?$'
          example: "100.00"
        currency:
          type: string
          enum:
            - THB
          default: THB
        paid_by:
          type: string
          format: uuid
        split_type:
          type: string
          enum:
            - equal
            - manual
        receipt_url:
          type: string
          format: uri
          nullable: true
        expense_date:
          type: string
          format: date
          nullable: true
        participants:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CreateExpenseParticipantRequest"
